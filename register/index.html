<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>claim your user - slugs.lol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/register/style.css">
</head>
<body class="bg-[#050505] text-white font-sans antialiased overflow-x-hidden relative min-h-screen selection:bg-blue-600 selection:text-white flex items-center justify-center p-4 sm:p-6">

    <div class="fixed inset-0 z-[0] bg-grid opacity-20 pointer-events-none"></div>
    <div class="fixed inset-0 z-[1] radial-mask pointer-events-none"></div>

    <div class="fixed inset-0 overflow-hidden pointer-events-none z-[2]">
        <div class="shape-1 absolute top-[-15%] left-[-10%] w-[800px] h-[800px] bg-blue-600/15 rounded-full blur-[150px]"></div>
        <div class="shape-2 absolute top-[30%] right-[-15%] w-[900px] h-[900px] bg-indigo-900/20 rounded-full blur-[180px]"></div>
        <div class="shape-3 absolute bottom-[-10%] left-[20%] w-[600px] h-[600px] bg-purple-900/10 rounded-full blur-[120px]"></div>

        <div class="floating-rect absolute top-[25%] left-[2%] sm:left-[8%] w-[280px] h-[200px] sm:w-[450px] sm:h-[320px] rounded-[2rem] sm:rounded-[3rem] border-2 border-white/10 bg-gradient-to-br from-white/5 to-transparent backdrop-blur-md transform -rotate-12 shadow-[0_0_40px_rgba(255,255,255,0.02)]"></div>
        
        <svg class="floating-triangle absolute top-[10%] sm:top-[12%] right-[5%] sm:right-[12%] w-[180px] h-[180px] sm:w-[280px] sm:h-[280px] text-indigo-400/30 drop-shadow-[0_0_15px_rgba(99,102,241,0.1)]" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 100 100">
            <polygon points="50,10 90,90 10,90" stroke-linejoin="round" />
        </svg>

        <div class="floating-circle absolute bottom-[15%] sm:bottom-[20%] right-[10%] sm:right-[18%] w-[120px] h-[120px] sm:w-[180px] sm:h-[180px] rounded-full border-2 border-blue-500/30 bg-transparent shadow-[0_0_30px_rgba(59,130,246,0.1)]"></div>
    </div>

    <a href="/" class="absolute top-5 left-5 sm:top-8 sm:left-8 flex items-center gap-2.5 sm:gap-3 cursor-pointer group z-50">
        <img src="/slugslol.png" alt="slugs.lol logo" class="w-5 h-5 sm:w-7 sm:h-7 object-contain bg-transparent transition-transform duration-500 group-hover:scale-110 group-hover:rotate-12">
        <span class="text-lg sm:text-2xl font-extrabold tracking-tight text-white drop-shadow-md">slugs.lol</span>
    </a>

    <main class="w-full max-w-[440px] relative z-10 mt-12 sm:mt-0 px-4">
        <div class="absolute -inset-1 bg-gradient-to-b from-blue-600/20 to-indigo-900/20 rounded-[2.5rem] blur-xl opacity-70"></div>
        
        <div class="bg-[#0a0a0a]/90 backdrop-blur-2xl border border-white/10 p-6 sm:p-10 rounded-[2rem] shadow-2xl relative overflow-hidden">
            
            <a href="/" class="absolute top-5 right-5 sm:top-8 sm:right-8 text-[10px] sm:text-xs font-bold text-gray-400 hover:text-white transition-all bg-transparent hover:bg-white/5 border border-white/10 px-2.5 sm:px-4 py-1.5 sm:py-2 rounded-full backdrop-blur-md flex items-center gap-1.5 shadow-lg z-20">
                <svg class="w-3 h-3 sm:w-3.5 sm:h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                Go back
            </a>

            <div class="w-11 h-11 sm:w-14 sm:h-14 bg-transparent border border-indigo-500/40 rounded-xl sm:rounded-2xl flex items-center justify-center mb-5 sm:mb-8 shadow-[0_0_20px_rgba(79,70,229,0.15)]">
                <svg class="w-4.5 h-4.5 sm:w-6 sm:h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </div>

            <h1 class="text-xl sm:text-3xl font-black text-white mb-2.5 sm:mb-4 tracking-tight">Create your account</h1>
            
            <p class="text-gray-400 text-xs sm:text-base mb-6 sm:mb-10 leading-relaxed font-medium pr-2">
                Build your profile, share your links, and customize everything in one place with lightning fast video uploads.
            </p>

            <form id="claimAccountForm" class="space-y-5 sm:space-y-7">
                <div class="space-y-2 sm:space-y-2.5">
                    <label for="usernameInput" class="text-[10px] sm:text-sm font-bold text-gray-300 block uppercase tracking-wider">Username</label>
                    <div class="flex items-center bg-[#050505] rounded-xl sm:rounded-2xl border border-white/10 focus-within:border-blue-500/60 focus-within:shadow-[0_0_25px_rgba(59,130,246,0.15)] transition-all overflow-hidden p-1 shadow-inner h-12 sm:h-16">
                        <div class="pl-3 sm:pl-5 pr-2 flex items-center text-gray-500">
                            <svg class="w-3.5 h-3.5 sm:w-5 sm:h-5 mr-1.5 sm:mr-2.5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                            <span class="font-bold text-xs sm:text-base select-none transition-colors focus-within:text-blue-400">slugs.lol/</span>
                        </div>
                        <input type="text" id="usernameInput" class="bg-transparent text-white font-bold text-xs sm:text-base outline-none w-full h-full placeholder-gray-700" placeholder="username" autocomplete="off" required>
                    </div>
                    <div id="usernameStatus" class="mt-2 text-xs sm:text-sm font-medium text-gray-500 min-h-[18px] smooth-transition opacity-0 transform translate-y-[-5px]"></div>
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white py-3.5 sm:py-4.5 rounded-xl sm:rounded-2xl font-bold text-xs sm:text-base transition-all transform hover:-translate-y-1 active:scale-[0.98] shadow-[0_10px_30px_rgba(37,99,235,0.25)] hover:shadow-[0_15px_40px_rgba(37,99,235,0.4)]">
                    Continue
                </button>
            </form>

            <div class="mt-6 sm:mt-10 text-center">
                <p class="text-[10px] sm:text-sm text-gray-500 font-medium">
                    Already have an account? 
                    <a href="/login" class="text-indigo-400 font-bold hover:text-indigo-300 transition-colors ml-1">Sign In</a>
                </p>
            </div>
        </div>
    </main>

    <script src="/register/script.js"></script>
</body>
</html>
