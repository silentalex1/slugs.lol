<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - slugs.lol</title>
    <meta name="description" content="Sign in to your slugs.lol account to manage your profile, links, and settings.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050505] text-white font-sans antialiased overflow-x-hidden relative min-h-screen selection:bg-purple-600 selection:text-white flex items-center justify-center p-4 sm:p-6">

    <div class="fixed inset-0 z-0 bg-grid opacity-20 pointer-events-none"></div>
    <div class="fixed inset-0 z-1 radial-mask pointer-events-none"></div>

    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="shape-1 absolute top-[-20%] left-[-10%] w-[700px] h-[700px] bg-purple-900/20 rounded-full blur-[160px]"></div>
        <div class="shape-2 absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] bg-indigo-900/15 rounded-full blur-[140px]"></div>
        <div class="floating-rect absolute top-[30%] left-[2%] sm:left-[8%] w-[280px] h-[200px] sm:w-[380px] sm:h-[260px] rounded-[2rem] border border-white/5 bg-gradient-to-br from-white/[0.03] to-transparent backdrop-blur-sm transform -rotate-12 hidden md:block"></div>
        <svg class="floating-triangle absolute top-[8%] right-[5%] sm:right-[10%] w-[160px] h-[160px] sm:w-[240px] sm:h-[240px] text-purple-400/15 hidden md:block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 100 100">
            <polygon points="50,10 90,90 10,90" stroke-linejoin="round" />
        </svg>
        <div class="floating-circle absolute bottom-[15%] right-[8%] sm:right-[16%] w-[100px] h-[100px] sm:w-[160px] sm:h-[160px] rounded-full border border-purple-500/15 hidden md:block"></div>
    </div>

    <a href="/" class="absolute top-5 left-5 sm:top-8 sm:left-8 flex items-center gap-2.5 sm:gap-3 cursor-pointer group z-50">
        <img src="slugslol2.png" alt="slugs.lol logo" class="w-5 h-5 sm:w-7 sm:h-7 rounded-lg transition-transform duration-500 group-hover:scale-110 group-hover:rotate-12 shadow-[0_0_15px_rgba(168,85,247,0.5)]">
        <span class="text-lg sm:text-2xl font-extrabold tracking-tight text-white drop-shadow-md">slugs.lol</span>
    </a>

    <main class="w-full max-w-[420px] relative z-10 mt-12 sm:mt-0 px-4 perspective-1000">
        <div class="absolute -inset-1 bg-gradient-to-b from-purple-700/20 to-indigo-900/20 rounded-[2.5rem] blur-xl opacity-60"></div>

        <div id="flipCard" class="relative w-full h-[600px] transform-style-3d transition-transform duration-700 ease-[cubic-bezier(0.23,1,0.32,1)]">

            <div id="loginFace" class="absolute inset-0 w-full h-full backface-hidden overflow-hidden bg-[#0a0a0c]/90 backdrop-blur-2xl border border-white/10 p-7 sm:p-10 rounded-[2.5rem] shadow-2xl flex flex-col">
                <a href="/" class="absolute top-5 right-5 sm:top-7 sm:right-7 text-[10px] sm:text-xs font-bold text-gray-400 hover:text-white transition-all bg-white/5 hover:bg-white/10 border border-white/10 px-3 sm:px-4 py-1.5 rounded-full flex items-center gap-1.5 z-20 shadow-lg">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                    Home
                </a>

                <div class="w-12 h-12 bg-purple-500/10 border border-purple-500/30 rounded-2xl flex items-center justify-center mb-6 shadow-[0_0_20px_rgba(168,85,247,0.15)]">
                    <svg class="w-6 h-6 text-purple-400" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M20.5 4.5h-17C2.67 4.5 2 5.17 2 6v12c0 .83.67 1.5 1.5 1.5h17c.83 0 1.5-.67 1.5-1.5V6c0-.83-.67-1.5-1.5-1.5zM20 18H4V7.94l8 5.33 8-5.33V18zm-8-7.33L4 5.5h16l-8 5.17z"/>
                    </svg>
                </div>

                <h1 class="text-2xl sm:text-3xl font-black text-white mb-2 tracking-tight">Log in to your account</h1>
                <p class="text-xs sm:text-sm text-gray-400 mb-6 leading-relaxed font-medium">Access your profile, links, and premium settings everywhere.</p>

                <form id="loginForm" class="space-y-4">
                    <div>
                        <label for="usernameInput" class="block text-[10px] sm:text-xs font-bold text-gray-400 mb-2 uppercase tracking-wider">Username or Email</label>
                        <div class="flex items-center bg-[#121216] border border-white/5 rounded-xl px-4 h-12 sm:h-14 focus-within:border-purple-500/50 focus-within:shadow-[0_0_20px_rgba(168,85,247,0.15)] transition-all">
                            <input type="text" id="usernameInput" class="bg-transparent border-none outline-none text-white placeholder-gray-600 text-sm w-full font-medium" placeholder="username or email" autocomplete="off" required>
                        </div>
                    </div>

                    <div class="relative">
                        <label for="passwordInput" class="block text-[10px] sm:text-xs font-bold text-gray-400 mb-2 uppercase tracking-wider">Password</label>
                        <div class="flex items-center bg-[#121216] border border-white/5 rounded-xl px-4 h-12 sm:h-14 focus-within:border-purple-500/50 focus-within:shadow-[0_0_20px_rgba(168,85,247,0.15)] transition-all">
                            <input type="password" id="passwordInput" class="bg-transparent border-none outline-none text-white placeholder-gray-600 text-sm w-full font-medium" placeholder="••••••••" required>
                        </div>
                        <button type="button" id="forgotPasswordBtn" class="absolute right-0 top-0 text-[10px] sm:text-xs text-gray-500 font-bold hover:text-purple-400 transition-colors">Forgot?</button>
                    </div>

                    <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-bold py-3.5 sm:py-4 rounded-xl transition-all transform hover:-translate-y-1 shadow-[0_8px_25px_rgba(124,58,237,0.3)] hover:shadow-[0_12px_35px_rgba(124,58,237,0.5)] active:scale-[0.98] mt-2">
                        Log in
                    </button>
                </form>

                <div class="flex items-center gap-4 my-5 sm:my-6">
                    <hr class="flex-grow border-white/10">
                    <span class="text-[10px] text-gray-600 font-black tracking-widest uppercase">OR</span>
                    <hr class="flex-grow border-white/10">
                </div>

                <button class="w-full bg-[#121216] hover:bg-white/5 text-white font-semibold py-3.5 sm:py-4 rounded-xl flex items-center justify-center gap-3 border border-white/5 hover:border-white/10 transition-all active:scale-[0.98]">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.9555 2.4189-2.1569 2.4189zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.4189-2.1568 2.4189Z"/></svg>
                    Continue with Discord
                </button>

                <div class="mt-auto text-center space-y-1.5 pt-4">
                    <p class="text-[11px] sm:text-xs text-gray-500 font-medium">Don't have an account? <a href="/register" class="text-purple-400 hover:text-purple-300 transition-colors font-bold ml-1">Create one</a></p>
                </div>
            </div>

            <div id="resetFace" class="absolute inset-0 w-full h-full backface-hidden rotate-y-180 overflow-hidden bg-[#0a0a0c]/90 backdrop-blur-2xl border border-white/10 p-7 sm:p-10 rounded-[2.5rem] shadow-2xl flex flex-col">
                <button type="button" id="flipBackButton" class="absolute top-5 right-5 sm:top-7 sm:right-7 text-[10px] sm:text-xs font-bold text-gray-400 hover:text-white transition-all bg-white/5 hover:bg-white/10 border border-white/10 px-3 sm:px-4 py-1.5 rounded-full flex items-center gap-1.5 z-20 shadow-lg">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                    Back to login
                </button>

                <div class="w-12 h-12 bg-indigo-500/10 border border-indigo-500/30 rounded-2xl flex items-center justify-center mb-6 shadow-[0_0_20px_rgba(99,102,241,0.15)] mt-4">
                    <svg class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                </div>

                <h1 class="text-2xl sm:text-3xl font-black text-white mb-2 tracking-tight">Reset Password</h1>
                <p class="text-xs sm:text-sm text-gray-400 mb-8 font-medium leading-relaxed">Enter your email address and we'll send you a link to reset your password securely.</p>

                <form id="resetForm" class="space-y-5">
                    <div>
                        <label for="resetEmailInput" class="block text-[10px] sm:text-xs font-bold text-gray-400 mb-2 uppercase tracking-wider">Email Address</label>
                        <div class="flex items-center bg-[#121216] border border-white/5 rounded-xl px-4 h-12 sm:h-14 focus-within:border-indigo-500/50 focus-within:shadow-[0_0_20px_rgba(99,102,241,0.15)] transition-all">
                            <input type="email" id="resetEmailInput" class="bg-transparent border-none outline-none text-white placeholder-gray-600 text-sm w-full font-medium" placeholder="you@example.com" required>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold py-3.5 sm:py-4 rounded-xl transition-all transform hover:-translate-y-1 shadow-[0_8px_25px_rgba(79,70,229,0.3)] hover:shadow-[0_12px_35px_rgba(79,70,229,0.5)] active:scale-[0.98] mt-4">
                        Send Reset Link
                    </button>
                </form>

                <div class="mt-auto text-center space-y-1.5 pt-4">
                    <p class="text-[11px] sm:text-xs text-gray-500 font-medium">Remembered your password? <button type="button" id="backToLoginText" class="text-indigo-400 hover:text-indigo-300 transition-colors font-bold ml-1">Log in here</button></p>
                </div>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
