<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - slugs.lol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/reset-password/reset-password.css">
</head>
<body class="bg-[#050505] text-white font-sans antialiased overflow-x-hidden relative min-h-screen selection:bg-emerald-600 selection:text-white flex items-center justify-center p-4 sm:p-6">

    <div class="fixed inset-0 z-[0] bg-grid opacity-20 pointer-events-none"></div>
    <div class="fixed inset-0 z-[1] radial-mask pointer-events-none"></div>

    <div class="fixed inset-0 overflow-hidden pointer-events-none z-[2]">
        <div class="shape-1 absolute top-[-15%] left-[-10%] w-[800px] h-[800px] bg-emerald-600/10 rounded-full blur-[150px]"></div>
        <div class="shape-2 absolute top-[30%] right-[-15%] w-[900px] h-[900px] bg-teal-900/20 rounded-full blur-[180px]"></div>
        <div class="shape-3 absolute bottom-[-10%] left-[20%] w-[600px] h-[600px] bg-green-900/10 rounded-full blur-[120px]"></div>
    </div>

    <a href="/login" class="absolute top-5 left-5 sm:top-8 sm:left-8 flex items-center gap-2.5 sm:gap-3 cursor-pointer group z-50">
        <div class="w-5 h-5 sm:w-7 sm:h-7 rounded-lg bg-emerald-500 transition-transform duration-500 group-hover:scale-110 group-hover:rotate-12"></div>
        <span class="text-lg sm:text-2xl font-extrabold tracking-tight text-white drop-shadow-md">slugs.lol</span>
    </a>

    <main class="w-full max-w-[440px] relative z-10 mt-12 sm:mt-0 px-4">
        <div class="absolute -inset-1 bg-gradient-to-b from-emerald-600/10 to-teal-900/10 rounded-[2.5rem] blur-xl opacity-70"></div>
        
        <div class="relative w-full bg-[#0a0a0a]/90 backdrop-blur-2xl border border-white/10 p-6 sm:p-10 rounded-[2rem] shadow-2xl flex flex-col">
            <a href="/login" class="absolute top-5 right-5 sm:top-8 sm:right-8 text-[10px] sm:text-xs font-bold text-gray-400 hover:text-white transition-all bg-transparent hover:bg-white/5 border border-white/10 px-2.5 sm:px-4 py-1.5 sm:py-2 rounded-full backdrop-blur-md flex items-center gap-1.5 shadow-lg z-20">
                <svg class="w-3 h-3 sm:w-3.5 sm:h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                Back to login
            </a>

            <div class="w-11 h-11 sm:w-14 sm:h-14 bg-transparent border border-teal-500/40 rounded-xl sm:rounded-2xl flex items-center justify-center mb-4 sm:mb-6 shadow-[0_0_20px_rgba(20,184,166,0.15)] shrink-0">
                <svg class="w-4.5 h-4.5 sm:w-6 sm:h-6 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
            </div>

            <div id="resetContent">
                <h1 id="resetTitle" class="text-xl sm:text-3xl font-black text-white mb-6 sm:mb-8 tracking-tight text-center">Account reset page for {{USERNAME}}</h1>

                <div id="errorMessage" class="hidden mb-4 p-3 bg-red-500/20 border border-red-500/50 rounded-xl text-red-400 text-xs sm:text-sm"></div>

                <form id="resetForm" class="space-y-4 sm:space-y-5">
                    <div class="space-y-1.5 sm:space-y-2">
                        <label for="newPassword" class="text-[10px] sm:text-sm font-bold text-gray-300 block uppercase tracking-wider">Enter new password.</label>
                        <div class="flex items-center bg-[#050505] rounded-xl sm:rounded-2xl border border-white/10 focus-within:border-emerald-500/60 transition-all overflow-hidden p-1 shadow-inner h-11 sm:h-14">
                            <input type="password" id="newPassword" class="bg-transparent text-white font-bold text-xs sm:text-base outline-none w-full h-full px-4 placeholder-gray-700" placeholder="••••••••" required minlength="6">
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white py-3 sm:py-4 rounded-xl sm:rounded-2xl font-bold text-xs sm:text-base transition-all transform hover:-translate-y-1 active:scale-[0.98] shadow-[0_10px_30px_rgba(5,150,105,0.25)] mt-4">
                        Submit.
                    </button>
                </form>
            </div>

            <div id="successContainer" class="hidden flex flex-col items-center justify-center text-center py-6">
                <div class="w-11 h-11 sm:w-14 sm:h-14 bg-transparent border border-emerald-500/40 rounded-xl sm:rounded-2xl flex items-center justify-center mb-4 shadow-[0_0_20px_rgba(16,185,129,0.15)] shrink-0">
                    <svg class="w-4.5 h-4.5 sm:w-6 sm:h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h2 class="text-xl sm:text-2xl font-black text-white mb-2">Password has been resetted!</h2>
                <p id="countdownMessage" class="text-gray-400 text-xs sm:text-sm font-medium">redirecting you to main site login now..</p>
            </div>
        </div>
    </main>

    <script src="/reset-password/reset-password.js"></script>
</body>
</html>
